name: CI

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: true
          fetch-depth: 1

      - uses: actions/setup-node@v4
        with:
          node-version: 22

      # The language engine's own suite, from the pinned fluffos commit --
      # tests the tokenizer/formatter/linter/grammar the build syncs in.
      - name: Grammar and tooling tests (upstream)
        run: node fluffos/tools/lpc-syntax/test.mjs

      # Extension-local checks (manifest, extension.js wiring, synced-engine
      # smoke test). Re-syncs extension/lib + extension/syntaxes internally.
      - name: Extension tests
        run: node scripts/test.mjs

      - name: Stage and package extension
        run: node scripts/build.mjs

      - uses: actions/upload-artifact@v4
        with:
          name: fluffos-lpc-vsix-${{ github.sha }}
          path: out/*.vsix
          if-no-files-found: error
